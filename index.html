<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<title>Graduation Application</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
  }

  /* HEADER */
  .header {
    background-color: #4b0082;
    color: white;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 20px;
  }

  .logo {
    font-weight: bold;
    font-size: 18px;
  }

  .user-menu {
    position: relative;
    cursor: pointer;
  }

  .user-name {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .dropdown {
    position: absolute;
    right: 0;
    top: 40px;
    background: white;
    color: black;
    border: 1px solid #ccc;
    width: 150px;
    display: none;
    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
  }

  .dropdown div {
    padding: 10px;
    cursor: pointer;
  }

  .dropdown div:hover {
    background-color: #eee;
  }

  /* Breadcrumb */
  .breadcrumb {
    background-color: #e0e0e0;
    padding: 10px 20px;
    font-size: 14px;
  }

  /* Main container */
  .container {
    width: 90%;
    max-width: 1100px;
    margin: 20px auto;
    background: white;
    padding: 20px;
    border: 1px solid #ddd;
  }

  h2 {
    margin-top: 0;
    font-weight: normal;
  }

  .section {
    border-top: 1px solid #ddd;
    padding: 15px 0;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  .field {
    font-size: 14px;
  }

  .label {
    color: #666;
    font-size: 12px;
  }

  .value {
    font-weight: Normal;
  }

  @media (max-width: 800px) {
    .grid {
      grid-template-columns: repeat(2, 1fr);
    }
  }
</style>

</head>

<body>

<!-- HEADER -->

<div class="header">
  <div class="logo">LAURIER</div>

  <div class="user-menu" onclick="toggleDropdown()">
    <div class="user-name">
      👤 Marcus Sim ⌄
    </div>


<div class="dropdown" id="dropdown">
  <div onclick="alert('Profile clicked')">Profile</div>
  <div onclick="logout()">Logout</div>
</div>


  </div>
</div>

<!-- Breadcrumb -->

<div class="breadcrumb">
  Convocation Portal
</div>

<!-- Main -->

<div class="container">
  <h2>Graduation Application</h2>

  <div class="section">
    <div class="grid">
      <div class="field">
        <div class="label">Name</div>
        <div class="value">Marcus Sim</div>
      </div>


  <div class="field">
    <div class="label">Application Number</div>
    <div class="value">1</div>
  </div>

  <div class="field">
    <div class="label">Request Date</div>
    <div class="value">11/24/2025</div>
  </div>

  <div class="field">
    <div class="label">Application Status</div>
    <div class="value">Application Granted</div>
  </div>
</div>

<div style="margin-top:20px;">
  <div class="label">Application Status Date</div>
  <div class="value">05/20/2026</div>
</div>


  </div>

  <div class="section">
    <h3 style="font-weight:normal;">Graduation Date</h3>


<div class="grid">
  <div class="field">
    <div class="label">Term</div>
    <div class="value">Spring 2026</div>
  </div>

  <div class="field">
    <div class="label">Year</div>
    <div class="value">2026-2027</div>
  </div>
</div>


  </div>

</div>

<script>
  function toggleDropdown() {
    const menu = document.getElementById("dropdown");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
  }

  function logout() {
    alert("Logged out (not really, just demo)");
  }

  // Close dropdown if clicked outside
  window.onclick = function(e) {
    if (!e.target.closest('.user-menu')) {
      document.getElementById("dropdown").style.display = "none";
    }
  }
</script>

</body>
</html>
